<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppleTech | Câmaras</title>
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="dashboard-container">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <!-- SIDEBAR HEADER -->
            <div class="header">
                <img src="../assets/img/logo-recolored.svg" alt="AppleTech Logo" class="logo">
            </div>
            <!-- SIDEBAR NAVLIST -->
            <nav class="navlist">
                <div class="nav-section">
                    <h4>Menu</h4>
                    <a href="./home.html" class="navitem">
                        <i class="fa-solid fa-house"></i>
                        <span>Início</span>
                    </a>
                    <a href="./chambers.html" class="navitem">
                        <i class="fa-solid fa-warehouse"></i>
                        <span>Câmaras</span>
                    </a>
                    <a href="./alerts.html" class="navitem">
                        <i class="fa-solid fa-warning"></i>
                        <span>Alertas</span>
                    </a>
                    <a href="./team.html" class="navitem">
                        <i class="fa-solid fa-user-group"></i>
                        <span>Equipe</span>
                    </a>
                </div>
                <div class="nav-section">
                    <h4>Outros</h4>
                    <a href="./configs.html" class="navitem">
                        <i class="fa-solid fa-gear"></i>
                        <span>Configs.</span>
                    </a>
                    <a href="#" class="navitem">
                        <i class="fa-solid fa-ear-listen"></i>
                        <span>Ajuda</span>
                    </a>
                </div>
            </nav>
            <!-- SIDEBAR FOOTER -->
            <div class="footer">
                <div class="logged-account">
                    <img id="account-pfp" src="" alt="user-account" class="pfp">
                    <div>
                        <p id="account-username"></p>
                        <span id="account-role"></span>
                    </div>
                </div>
                <button id="logout-btn">
                    <i class="fa-solid fa-right-from-bracket" style="rotate: 180deg"></i>
                    <span>Sair</span>
                </button>
            </div>
        </div>
        <!-- CONTENT -->
        <div class="content">
            <div class="header">
                <h1>Central de Ajuda</h1>
            </div>
            
        
        <div class="content-left">
        <h2 class="title-help">Ficou Alguma Dúvida? Entre em Contato:</h2>
 
        <div class="field-gap">
          <label class="field-label" for="nome">Nome</label>
          <input class="field-input" type="text" id="nome" placeholder="John Doe" />
        </div>
 
        <div class="field-gap">
          <label class="field-label" for="email">E-mail</label>
          <input class="field-input" type="email" id="email" placeholder="john.Doe@gmail.com" />
        </div>
 
        <div class="field-gap">
          <label class="field-label" for="assunto">Assunto</label>
          <textarea class="field-input tall" type="text" id="assunto"></textarea>
        </div>
 
        <button class="button-send">Enviar E-mail</button>
        
        <div class="content-right">
            <div>
                <img src="../assets/img/help.png" alt="">
            </div>
        </div>
    </div>
      

</body>
</html>
<script>
    const DADOS_CONTA_FICTICIA = {
        pfp: "../assets/img/avatar-pfp.png",
        username: "John Doe",
        role: "Administrador"
    }

    const account_pfp = document.getElementById("account-pfp");
    const account_username = document.getElementById("account-username");
    const account_role = document.getElementById("account-role");

    account_pfp.src = DADOS_CONTA_FICTICIA.pfp;
    account_username.innerText = DADOS_CONTA_FICTICIA.username;
    account_role.innerText = DADOS_CONTA_FICTICIA.role;
</script>
