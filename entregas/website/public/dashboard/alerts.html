<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppleTech | Alertas</title>

    <!-- ESTILOS DA DASHBOARD -->
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/dashboard/shared.css">
    <link rel="stylesheet" href="../css/dashboard/alerts.css">
    
    <!-- CDNs Chart.JS e FontAwesome -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="dashboard-container">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <!-- SIDEBAR HEADER -->
            <div class="header">
                <img src="../assets/imgs/logo-recolored.svg" alt="AppleTech Logo" class="logo">
            </div>

            <!-- SIDEBAR NAVLIST -->
            <nav class="navlist">
                <div class="nav-section">
                    <h4>Menu</h4>
                    <a href="./home.html" class="navitem">
                        <i class="fa-solid fa-house"></i>
                        <span>Início</span>
                    </a>
                    <a href="./chambers.html" class="navitem">
                        <i class="fa-solid fa-warehouse"></i>
                        <span>Câmaras</span>
                    </a>
                    <a href="#" class="navitem">
                        <i class="fa-solid fa-warning"></i>
                        <span>Alertas</span>
                    </a>
                    <a href="./team.html" class="navitem">
                        <i class="fa-solid fa-user-group"></i>
                        <span>Equipe</span>
                    </a>
                </div>
                <div class="nav-section">
                    <h4>Outros</h4>
                    <a href="./configs.html" class="navitem">
                        <i class="fa-solid fa-gear"></i>
                        <span>Configs.</span>
                    </a>
                    <a href="./help.html" class="navitem">
                        <i class="fa-solid fa-ear-listen"></i>
                        <span>Ajuda</span>
                    </a>
                </div>
            </nav>

            <!-- SIDEBAR FOOTER -->
            <div class="footer">
                <div class="logged-account">
                    <img id="account-pfp" src="" alt="user-account" class="pfp">
                    <div>
                        <p id="account-username"></p>
                        <span id="account-role"></span>
                    </div>
                </div>
                <button id="logout-btn">
                    <i class="fa-solid fa-right-from-bracket" style="rotate: 180deg"></i>
                    <span>Sair</span>
                </button>
            </div>
        </div>

        <!-- CONTENT -->
        <div class="content">
            <!-- CONTENT HEADER -->
            <div class="header">
                <h1>Dashboard - Início</h1>
                <span id="current-date">Seg, 12 abr</span>
            </div>

            <!-- CONTENT MAIN -->
            <main class="main">
                <h2>Alerts</h2>
            </main>
        </div>
    </div>
    
<script src="../scripts/mock-user.js"></script>
</body>
</html>
