<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppleTech | Dashboard</title>
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="dashboard-container">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <!-- SIDEBAR HEADER -->
            <div class="header">
                <img src="../assets/img/logo-recolored.svg" alt="AppleTech Logo" class="logo">
            </div>
            <!-- SIDEBAR NAVLIST -->
            <nav class="navlist">
                <div class="nav-section">
                    <h4>Menu</h4>
                    <a href="#" class="navitem">
                        <i class="fa-solid fa-house"></i>
                        <span>Início</span>
                    </a>
                    <a href="./chambers.html" class="navitem">
                        <i class="fa-solid fa-warehouse"></i>
                        <span>Câmaras</span>
                    </a>
                    <a href="./alerts.html" class="navitem">
                        <i class="fa-solid fa-warning"></i>
                        <span>Alertas</span>
                    </a>
                    <a href="./team.html" class="navitem">
                        <i class="fa-solid fa-user-group"></i>
                        <span>Equipe</span>
                    </a>
                </div>
                <div class="nav-section">
                    <h4>Outros</h4>
                    <a href="./configs.html" class="navitem">
                        <i class="fa-solid fa-gear"></i>
                        <span>Configs.</span>
                    </a>
                    <a href="./help.html" class="navitem">
                        <i class="fa-solid fa-ear-listen"></i>
                        <span>Ajuda</span>
                    </a>
                </div>
            </nav>
            <!-- SIDEBAR FOOTER -->
            <div class="footer">
                <div class="logged-account">
                    <img id="account-pfp" src="" alt="user-account" class="pfp">
                    <div>
                        <p id="account-username"></p>
                        <span id="account-role"></span>
                    </div>
                </div>
                <button id="logout-btn">
                    <i class="fa-solid fa-right-from-bracket" style="rotate: 180deg"></i>
                    <span>Sair</span>
                </button>
            </div>
        </div>

        <!-- CONTENT -->
        <div class="content">
            <!-- CONTENT HEADER -->
            <div class="header">
                <h1>Dashboard - Início</h1>
                <span id="current-date">Seg, 12 abr</span>
            </div>

            <!-- CONTENT MAIN -->
            <main class="main">
                <!-- CONTENT KPIs -->
                <div class="kpi-list">
                    <div class="kpi-card">
                        <div class="kpi-header">
                            <p>Concentração Atual</p>
                            <i class="fa-solid fa-chart-simple"></i>
                        </div>
                        <div class="kpi-content">
                            <h1>2.5ppm</h1>
                        </div>
                        <div class="kpi-footer">
                            8hrs atrás
                        </div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-header">
                            <p>Status Geral</p>
                            <i class="fa-solid fa-chart-simple"></i>
                        </div>
                        <div class="kpi-content">
                            <h1>Sob Controle</h1>
                        </div>
                        <div class="kpi-footer">
                            8hrs atrás
                        </div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-header">
                            <p>Estoque em Risco</p>
                            <i class="fa-solid fa-chart-simple"></i>
                        </div>
                        <div class="kpi-content">
                            <h1>13%</h1>
                        </div>
                        <div class="kpi-footer">
                            equivalente à 320 maçãs
                        </div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-header">
                            <p>Percentual de Lucro</p>
                            <i class="fa-solid fa-chart-simple"></i>
                        </div>
                        <div class="kpi-content">
                            <h1>70%</h1>
                        </div>
                        <div class="kpi-footer">
                            8hrs atrás
                        </div>
                    </div>
                </div>
                <!-- CONTENT MÉTRICAS -->
                <div class="metrics">
                    <!-- CONTENT GRÁFICOS -->
                    <div class="charts">
                        <!-- CONTENT GRÁFICO LINHAS -->
                        <div class="chart-1">
                            <canvas id="line-chart"></canvas>
                        </div>
                        <!-- CONTENT GRÁFICO COLUNAS -->
                        <div class="chart-1">
                            <canvas id="line-chart"></canvas>
                        </div>
                    </div>
                    <!-- CONTENT ASIDE -->
                    <aside class="aside">
                        <!-- CONTENT LISTA DE ALERTAS -->
                        <div class="alert-list"></div>
                        <!-- CONTENT STATUS SENSORES -->
                        <div class="sensor-status"></div>
                    </aside>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
<script>
    const DADOS_CONTA_FICTICIA = {
        pfp: "../assets/img/avatar-pfp.png",
        username: "John Doe",
        role: "Administrador"
    }

    const account_pfp = document.getElementById("account-pfp");
    const account_username = document.getElementById("account-username");
    const account_role = document.getElementById("account-role");

    account_pfp.src = DADOS_CONTA_FICTICIA.pfp;
    account_username.innerText = DADOS_CONTA_FICTICIA.username;
    account_role.innerText = DADOS_CONTA_FICTICIA.role;
</script>
<script>
     let labels = ['12:00', 
    '13:00', 
    '14:00', 
    '15:00', 
    '16:00', 
    '17:00'];

    let Camara1 = {
        labels: labels,
        datasets: [{
            label: 'Etileno Camara 1 (PPM)',
            backgroundColor: 'rgb(255, 99, 132)',
            borderColor: 'rgb(255, 99, 132)',
            data: [1.0, 1.5, 0.7, 1.0, 1.4, 1.9,],
        }]
    };

    let Camara2 = {
        labels: labels,
        datasets: [{
            label: 'Etileno Camara 2 (PPM)',
            backgroundColor: 'rgb(54, 162, 235)',
            borderColor: 'rgb(54, 162, 235)',
            data: [0.7, 1.0, 1.3, 1.4, 0.5, 1.2,],
        }]
    };

    let Camara3 = {
        labels: labels,
        datasets: [{
            label: 'Etileno Camara 3 (PPM)',
            backgroundColor: 'rgb(255, 206, 86)',
            borderColor: 'rgb(255, 206, 86)',
            data: [0.5, 0.3, 0.8, 2.5, 2.2, 2.3,],
        }]
    };

    let Camara4 = {
        labels: labels,
        datasets: [{
            label: 'Etileno Camara 4 (PPM)',
            backgroundColor: 'rgb(75, 192, 192)',
            borderColor: 'rgb(75, 192, 192)',
            data: [1.0, 1.5, 0.6, 0.4, 0.9, 1.2,],
        }]
    };

    let Camara5 = {
        labels: labels,
        datasets: [{
            label: 'Etileno Camara 5 (PPM)',
            backgroundColor: 'rgb(153, 102, 255)',
            borderColor: 'rgb(153, 102, 255)',
            data: [1.0, 1.3, 0.8, 0.5, 0.9, 1.4,],
        }]
    };

    let Camara6 = {
        labels: labels,
        datasets: [{
            label: 'Etileno Camara 6 (PPM)',
            backgroundColor: 'rgb(255, 159, 64)',
            borderColor: 'rgb(255, 159, 64)',
            data: [1.0, 1.8, 0.8, 2.0, 2.3, 1.7,],
        }]
    };

     let data = {
        labels: labels,
        datasets: [
            Camara1.datasets[0],
            Camara2.datasets[0],
            Camara3.datasets[0],
            Camara4.datasets[0],
            Camara5.datasets[0],
            Camara6.datasets[0]
        ]
    };

    let config = {
        type: 'line',
        data: data,
        options: {}
    };
</script>


<script>
    let labels2 = ['Camara 1', 
    'Camara 2', 
    'Camara 3', 
    'Camara 4', 
    'Camara 5', 
    'Camara 6'];


    let mediaEtilenoCamara = {
        labels: labels2,
        datasets: [{
            label: 'Média de Etileno (PPM)',
            backgroundColor: 'rgb(255, 99, 132)',
            borderColor: 'rgb(255, 99, 132)',
            data: [1.5, 0.3, 0.8, 1.2, 1.0, 0.5],
        }]
    };

        let data2 = {
            labels: labels2,
            datasets: [
                mediaEtilenoCamara.datasets[0]
            ]
        };

    let config2 = {
        type: 'bar',
        data: data2,
        options: {}
    };
</script>


<script>
    let myChart = new Chart(
        document.getElementById('myChart'),
        config
    );

    let myChart2 = new Chart(
        document.getElementById('myChart2'),
        config2
    );
</script>
