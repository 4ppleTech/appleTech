<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppleTech | Cadastro</title>

    <!-- ESTILOS GLOBAIS E DA PÁGINA -->
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/auth.css">
    <link rel="shortcut icon" href="./assets/imgs/favicon.ico" type="image/x-icon">

    <!-- CDN FONTAWESOME -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

    <!-- Botão voltar para a página inicial -->
    <a class="btn-home" href="./index.html" title="Voltar ao início">
        <i class="fa-solid fa-arrow-left"></i>
    </a>

    <div class="wrapper wrapper--cadastro">

        <!-- Imagem lateral -->
        <div class="img-box">
            <img src="./assets/imgs/auth-banner.png" alt="Imagem de fundo">
        </div>

        <!-- Formulário de cadastro -->
        <div class="auth-container">

            <img class="auth-logo auth-logo--cadastro" src="./assets/svgs/logo.svg" alt="Logo AppleTech">

            <h3>Crie sua conta</h3>

            <!-- Código de ativação -->
            <div class="input-group">
                <i class="fa-solid fa-key"></i>
                <input
                    type="text"
                    id="ipt-codigo"
                    class="auth-input"
                    placeholder="Código de ativação"
                    autocomplete="off"
                    required
                >
            </div>

            <!-- Usuário -->
            <div class="input-group">
                <i class="fa-regular fa-circle-user"></i>
                <input
                    type="text"
                    id="ipt-usuario"
                    class="auth-input"
                    placeholder="Nome"
                    autocomplete="username"
                    required
                >
            </div>

            <!-- E-mail -->
            <div class="input-group">
                <i class="fa-regular fa-envelope"></i>
                <input
                    type="email"
                    id="ipt-email"
                    class="auth-input"
                    placeholder="Email"
                    autocomplete="email"
                    required
                >
            </div>

            <!-- Senha -->
            <div class="input-group input-group--password">
                <i class="fa-solid fa-lock"></i>
                <input
                    type="password"
                    id="ipt-senha"
                    class="auth-input"
                    placeholder="Senha"
                    autocomplete="current-password"
                    required
                >
                <button
                    class="passwd-toggle-btn"
                    type="button"
                    onclick="alternarVisibilidadeSenha('ipt-senha', 'senha-icon')"
                >
                    <i id="senha-icon" class="fa-regular fa-eye"></i>
                </button>
            </div>

            <!-- Confirmar senha -->
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input
                    type="password"
                    id="ipt-confirmar"
                    class="auth-input"
                    placeholder="Confirmar senha"
                    autocomplete="new-password"
                    required
                >
                <button
                    class="passwd-toggle-btn"
                    type="button"
                    onclick="alternarVisibilidadeSenha('ipt-confirmar', 'confirmar-icon')"
                >
                    <i id="confirmar-icon" class="fa-regular fa-eye"></i>
                </button>
            </div>

            <!-- Mensagem de validação -->
            <p id="auth-message" class="auth-message"></p>

            <button class="auth-btn">
                Cadastrar
                <i class="fa-regular fa-circle-up"></i>
            </button>

            <a class="auth-link auth-link--login" href="./login.html">Já tem uma conta? Entrar</a>

        </div>
    </div>
    
<script src="./scripts/toggle-senha.js"></script>
</body>
</html>
