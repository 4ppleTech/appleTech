<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppleTech | Cadastro</title>

    <!-- ESTILOS GLOBAIS E DA PÁGINA -->
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/auth.css">
    <link rel="shortcut icon" href="./assets/imgs/favicon.ico" type="image/x-icon">

    <!-- CDN FONTAWESOME -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body onload="listar()">

    <!-- Botão voltar para a página inicial -->
    <a class="btn-home" href="./index.html" title="Voltar ao início">
        <i class="fa-solid fa-arrow-left"></i>
    </a>

    <div class="wrapper wrapper--cadastro">

        <!-- Imagem lateral -->
        <div class="img-box">
            <img src="./assets/imgs/auth-banner.png" alt="Imagem de fundo">
        </div>

        <!-- Formulário de cadastro -->
        <div class="auth-container">

            <img class="auth-logo auth-logo--cadastro" src="./assets/svgs/logo.svg" alt="Logo AppleTech">

            <h3>Crie sua conta</h3>

            <!-- Código de ativação -->
            <div class="input-group">
                <i class="fa-solid fa-key"></i>
                <input
                    type="text"
                    id="ipt_codigo"
                    class="auth-input"
                    placeholder="Código de ativação"
                    autocomplete="off"
                    required
                >
            </div>

            <!-- Usuário -->
            <div class="input-group">
                <i class="fa-regular fa-circle-user"></i>
                <input
                    type="text"
                    id="ipt_usuario"
                    class="auth-input"
                    placeholder="Nome"
                    autocomplete="username"
                    required
                >
            </div>

            <!-- E-mail -->
            <div class="input-group">
                <i class="fa-regular fa-envelope"></i>
                <input
                    type="email"
                    id="ipt_email"
                    class="auth-input"
                    placeholder="Email"
                    autocomplete="email"
                    required
                >
            </div>

            <!-- Senha -->
            <div class="input-group input-group--password">
                <i class="fa-solid fa-lock"></i>
                <input
                    type="password"
                    id="ipt_senha"
                    class="auth-input"
                    placeholder="Senha"
                    autocomplete="current-password"
                    required
                >
                <button
                    class="passwd-toggle-btn"
                    type="button"
                    onclick="alternarVisibilidadeSenha('ipt_senha', 'senha-icon')"
                >
                    <i id="senha-icon" class="fa-regular fa-eye"></i>
                </button>
            </div>

            <!-- Confirmar senha -->
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input
                    type="password"
                    id="ipt_confirmar"
                    class="auth-input"
                    placeholder="Confirmar senha"
                    autocomplete="new-password"
                    required
                >
                <button
                    class="passwd-toggle-btn"
                    type="button"
                    onclick="alternarVisibilidadeSenha('ipt_confirmar', 'confirmar-icon')"
                >
                    <i id="confirmar-icon" class="fa-regular fa-eye"></i>
                </button>
            </div>

            <!-- Mensagem de validação -->
            <p id="auth_message" class="auth-message"></p>

            <button class="auth-btn" onclick="cadastrar()">
                Cadastrar
                <i class="fa-regular fa-circle-up"></i>
            </button>

            <a class="auth-link auth-link--login" href="./login.html">Já tem uma conta? Entrar</a>

        </div>
    </div>
    
<script src="./scripts/toggle-senha.js"></script>
<script>

  // Array para armazenar empresas cadastradas para validação de código de ativação 
  let listaEmpresasCadastradas = [];

  function cadastrar() {
    // aguardar();

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = ipt_usuario.value;
    var emailVar = ipt_email.value;
    var senhaVar = ipt_senha.value;
    var confirmacaoSenhaVar = ipt_confirmar.value;
    var codigoVar = ipt_codigo.value;
    var idEmpresaVincular

    // Verificando se há algum campo em branco
    if (
      nomeVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == "" ||
      codigoVar == ""
    ) {
      auth_message.style.display = "block";
      auth_message.innerHTML =
        "(Mensagem de erro para todos os campos em branco)";

    //   finalizarAguardar();
      return false;
    } else {
      setInterval(sumirMensagem, 5000);
    }

    // Verificando se o código de ativação é de alguma empresa cadastrada
    for (let i = 0; i < listaEmpresasCadastradas.length; i++) {
        console.log("Cod: ", listaEmpresasCadastradas[i])
      if (listaEmpresasCadastradas[i].codigo_ativacao == codigoVar) {
        idEmpresaVincular = listaEmpresasCadastradas[i].empresaId
        console.log("Código de ativação válido.");
        break;
      } else {
        auth_message.style.display = "block";
        auth_message.innerHTML = "(Mensagem de erro para código inválido)";
        // finalizarAguardar();
      }
    }

    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar,
        idEmpresaVincularServer: idEmpresaVincular
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          auth_message.style.display = "block";

          auth_message.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, 2000);

          limparFormulario();
        //   finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        // finalizarAguardar();
      });

    return false;
  }

  // Listando empresas cadastradas 
  function listar() {
    fetch("/empresas/listar", {
      method: "GET",
    })
      .then(function (resposta) {
        resposta.json().then((empresas) => {
            console.log("listaEmpresasCadastradas");
            empresas.forEach((empresa) => {
                listaEmpresasCadastradas.push(empresa);

                console.log(empresa.codigo_ativacao)
            });
        });
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });
  }

  function sumirMensagem() {
    auth_message.style.display = "none";
  }
</script>
</body>
</html>
