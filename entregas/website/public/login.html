<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppleTech | Login</title>

    <!-- ESTILOS GLOBAIS E DA PÁGINA -->
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/auth.css">
    <link rel="shortcut icon" href="./assets/imgs/favicon.ico" type="image/x-icon">

    <!-- CDN FONTAWESOME -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

    <!-- Botão voltar para a página inicial -->
    <a class="btn-home" href="./index.html" title="Voltar ao início">
        <i class="fa-solid fa-arrow-left"></i>
    </a>

    <div class="wrapper wrapper--login">

        <!-- Imagem lateral -->
        <div class="img-box">
            <img src="./assets/imgs/auth-banner.png" alt="Banner de login">
        </div>

        <!-- Formulário de login -->
        <form id="login-form" class="auth-container">

            <img class="auth-logo auth-logo--login" src="./assets/svgs/logo.svg" alt="Logo AppleTech">

            <h3>Entre na sua conta</h3>

            <!-- E-mail -->
            <div class="input-group">
                <i class="fa-regular fa-envelope"></i>
                <input
                    type="email"
                    id="ipt-email"
                    class="auth-input"
                    placeholder="Email"
                    autocomplete="email"
                >
            </div>

            <div class="input-group input-group--password">
                <i class="fa-solid fa-lock"></i>
                <input
                    type="password"
                    id="ipt-senha"
                    class="auth-input"
                    placeholder="Senha"
                    autocomplete="current-password"
                >
                <button
                    class="passwd-toggle-btn"
                    type="button"
                    aria-label="Mostrar senha"
                    onclick="alternarVisibilidadeSenha('ipt-senha', 'senha-icon')"
                >
                    <i id="senha-icon" class="fa-regular fa-eye"></i>
                </button>
            </div>

            <a class="auth-link auth-link--forgot" href="/">Esqueceu a senha?</a>

            <p id="auth-message" class="auth-message"></p>

            <button class="auth-btn" type="submit">
                Entrar
                <i class="fa-regular fa-circle-up"></i>
            </button>

            <a class="auth-link auth-link--register" href="./cadastro.html">Não tem conta? Cadastre-se</a>
        </form>
    </div>

<script src="./scripts/toggle-senha.js"></script>
<script src="./scripts/auth/validar.js"></script>
<script>
    const frm = document.getElementById("login-form");
    const mensagemValidacao = document.getElementById("auth-message");
    
    frm.addEventListener("submit", (e) => {
        e.preventDefault();
        mensagemValidacao.innerHTML = "";

        const email = document.getElementById("ipt-email").value.trim();
        const senha = document.getElementById("ipt-senha").value.trim();

        // === VALIDAR CAMPOS === //
        const valido = loginValido(
            email, 
            senha, 
        );

        // === ENVIAR FORMULÁRIO === //
        if(!valido[0]) {
            authMessage.innerHTML = valido[1][0];
        } else {
            fetch("/usuarios/autenticar", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    email,
                    senha,
                })
            })
            .then((res) => {
                console.log("RESPOSTA: ", res);
                if(res.ok) {
                    // exibir card com mensagem de sucesso...;
                    // redirecionar:
                    setTimeout(() => {
                        window.location("./dashboard/home.html");
                    }, 2000);

                    // limpar formulário...
                } else {
                    throw "Houve um erro ao tentar realizar o login!";
                }
            })
            .catch((err) => {
                console.log("[login] ERRO: ", err);
            })
        }
    });
</script>
</body>
</html>
