<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppleTech | Login</title>

    <!-- ESTILOS GLOBAIS E DA PÁGINA -->
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/auth.css">
    <link rel="shortcut icon" href="./assets/imgs/favicon.ico" type="image/x-icon">

    <!-- CDN FONTAWESOME -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

    <!-- Botão voltar para a página inicial -->
    <a class="btn-home" href="./index.html" title="Voltar ao início">
        <i class="fa-solid fa-arrow-left"></i>
    </a>

    <div class="wrapper wrapper--login">

        <!-- Imagem lateral -->
        <div class="img-box">
            <img src="./assets/imgs/auth-banner.png" alt="Banner de login">
        </div>

        <!-- Formulário de login -->
        <div class="auth-container">

            <img class="auth-logo auth-logo--login" src="./assets/svgs/logo.svg" alt="Logo AppleTech">

            <h3>Entre na sua conta</h3>

            <!-- E-mail -->
            <div class="input-group">
                <i class="fa-regular fa-envelope"></i>
                <input
                    type="email"
                    id="ipt_email"
                    class="auth-input"
                    placeholder="Email"
                    autocomplete="email"
                >
            </div>

            <div class="input-group input-group--password">
                <i class="fa-solid fa-lock"></i>
                <input
                    type="password"
                    id="ipt_senha"
                    class="auth-input"
                    placeholder="Senha"
                    autocomplete="current-password"
                >
                <button
                    class="passwd-toggle-btn"
                    type="button"
                    aria-label="Mostrar senha"
                    onclick="alternarVisibilidadeSenha('ipt-senha', 'senha-icon')"
                >
                    <i id="senha-icon" class="fa-regular fa-eye"></i>
                </button>
            </div>

            <a class="auth-link auth-link--forgot" href="/">Esqueceu a senha?</a>

            <p id="auth_message" class="auth-message"></p>

            <button class="auth-btn" onclick="entrar()">
                Entrar
                <i class="fa-regular fa-circle-up"></i>
            </button>

            <a class="auth-link auth-link--register" href="./cadastro.html">Não tem conta? Cadastre-se</a>
        </div>
    </div>

<script src="./scripts/utils/sessao.js"></script>
<script src="./scripts/toggle-senha.js"></script>
<script>


    function entrar() {
        // aguardar();

        var emailVar = ipt_email.value;
        var senhaVar = ipt_senha.value;

        if (emailVar == "" || senhaVar == "") {
            auth_message.style.display = "block"
            auth_message.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            // finalizarAguardar();
            return false;
        }
        else {
            setInterval(sumirMensagem, 5000)
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;
                    sessionStorage.PAPEL_USUARIO = json.papel_usuario;
                    sessionStorage.SITUACAO_USUARIO = json.situacao;
                    sessionStorage.CAMARAS = JSON.stringify(json.camaras)

                    setTimeout(function () {
                        window.location = "./dashboard/home.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    // finalizarAguardar(texto);    
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function sumirMensagem() {
        auth_message.style.display = "none"
    }

</script>
</body>
</html>
